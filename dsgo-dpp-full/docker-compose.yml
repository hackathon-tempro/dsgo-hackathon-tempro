version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dsgo-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-dsgo_dpp}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/migrations/001-init.sql:/docker-entrypoint-initdb.d/001-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-dsgo_dpp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dsgo_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dsgo-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dsgo_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dsgo-backend
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-dsgo_dpp}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CREDENCO_BASE_URL: ${CREDENCO_BASE_URL:-https://wallet.acc.credenco.com}
      CREDENCO_CLIENT_ID: ${CREDENCO_CLIENT_ID}
      CREDENCO_CLIENT_SECRET: ${CREDENCO_CLIENT_SECRET}
      ISHARE_BASE_URL: ${ISHARE_BASE_URL:-https://scheme.ishare.eu}
      ISHARE_CLIENT_ID: ${ISHARE_CLIENT_ID}
      ISHARE_CLIENT_SECRET: ${ISHARE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004,http://localhost:3005}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/keys:/app/keys:ro
    networks:
      - dsgo_network
    restart: unless-stopped

  supplier-frontend:
    build:
      context: ./frontends/supplier
      dockerfile: Dockerfile
    container_name: dsgo-supplier-frontend
    ports:
      - "3001:3000"
    environment:
      REACT_APP_API_URL: http://localhost:3000/api/v1
      REACT_APP_ORG_ROLE: supplier
    depends_on:
      - backend
    networks:
      - dsgo_network
    restart: unless-stopped

  manufacturer-frontend:
    build:
      context: ./frontends/manufacturer
