version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dsgo-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-dsgo_dpp}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/migrations/001-init.sql:/docker-entrypoint-initdb.d/001-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-dsgo_dpp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dsgo_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dsgo-backend
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-dsgo_dpp}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CREDENCO_BASE_URL: ${CREDENCO_BASE_URL:-https://wallet.acc.credenco.com}
      CREDENCO_CLIENT_ID: ${CREDENCO_CLIENT_ID}
      CREDENCO_CLIENT_SECRET: ${CREDENCO_CLIENT_SECRET}
      ISHARE_BASE_URL: ${ISHARE_BASE_URL:-https://scheme.ishare.eu}
      ISHARE_CLIENT_ID: ${ISHARE_CLIENT_ID}
      ISHARE_CLIENT_SECRET: ${ISHARE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3001}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/keys:/app/keys:ro
    networks:
      - dsgo_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dsgo-frontend
    ports:
      - "3001:3001"
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
    depends_on:
      - backend
    networks:
      - dsgo_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  dsgo_network:
    driver: bridge
